<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
    }
    .container {
      text-align: center;
      width: 100%;
      max-width: 580px;
      padding: 0 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 400;
      color: #333;
      margin-bottom: 24px;
    }
    form {
      display: flex;
      gap: 0;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px 0 0 8px;
      outline: none;
    }
    input:focus {
      border-color: #999;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      background: #c00;
      color: #fff;
      border: none;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
    }
    button:hover {
      background: #a00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube Search</h1>
    <form action="https://www.youtube.com/results" method="GET" target="_blank">
      <input type="text" name="search_query" placeholder="Search YouTube..." autofocus required>
      <button type="submit">Search</button>
    </form>
  </div>
</body>
</html>
